services:
  - type: web
    name: vetbridge-api
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vetbridge-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vetbridge-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000

databases:
  - name: vetbridge-postgres
    databaseName: vetbridge_db
    user: vetbridge_user

  - name: vetbridge-redis
    type: redis
