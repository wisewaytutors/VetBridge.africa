version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vetbridge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vetbridge_user
      POSTGRES_PASSWORD: vetbridge_pass
      POSTGRES_DB: vetbridge_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vetbridge_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: vetbridge_api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      DATABASE_URL: postgresql://vetbridge_user:vetbridge_pass@postgres:5432/vetbridge_db
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
